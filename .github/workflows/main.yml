name: Update word counts daily

on:
  schedule:
    # 3時間ごとに実行 (1日8回) — UTC基準
    - cron: '0 */3 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ファイル更新+コミット用

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ① 語数データ生成 (word_counts.js)
      - name: Run word count update
        env:
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        run: python scripts/update_word_counts.py

      # ② ピラー検証 (pillar_audit.js) — word_counts.js を読むので①の後
      - name: Run pillar audit
        env:
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
        run: python scripts/pillar_audit.py

      - name: Check for changes
        id: check
        run: |
          if [[ -n $(git status --porcelain word_counts.js pillar_audit.js) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add word_counts.js pillar_audit.js
          git commit -m "Auto update word counts & pillar audit ($(date +'%Y-%m-%d %H:%M ICT'))"
          git push

      - name: Summary
        run: |
          if [[ "${{ steps.check.outputs.changed }}" == "true" ]]; then
            echo "✅ 変更あり: word_counts.js / pillar_audit.js を更新しました" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ 変更なし: スキップしました" >> $GITHUB_STEP_SUMMARY
          fi
